<!DOCTYPE html>
<html lang="en">
<head>
	<title>Contact Template</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="icon" href="img/contact_mail.ico"/>
	<meta name="author" content="Yuli Petrilli">
	<meta name="description" content="Free contact template made with Bootstrap 5">
	<!-- / Bootstrap Core -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<!-- / Custom style -->
	<link rel="stylesheet" type="text/css" href="css/style.css">
</head>
<body>
<main>
	<div class="form-main-container d-flex flex-wrap justify-content-center align-items-center w-100 min-vh-100">
		<div class="form-wrapper">
			<div class="form-header d-flex flex-column justify-content-center align-items-center w-100">
				<h2 class="form-title mb-2">
					Contact us
				</h2>
				<h3 class="form-subtitle">
					Fill out this form and we will get back to you!
				</h3>
			</div>
			<form class="form-content d-flex flex-wrap justify-content-center align-items-center w-100">
				<div class="input-wrapper">
					<label class="txt-style1">Name</label>
					<input class="input-style" type="text" name="name" required>
					<span class="input-style-focus"></span>
				</div>
				<div class="input-wrapper">
					<label class="txt-style1">Email Address</label>
					<input class="input-style" type="email" name="email" required>
					<span class="input-style-focus"></span>
				</div>
				<div class="input-wrapper">
					<label class="txt-style1">Subject</label>
					<input class="input-style" type="text" name="subject" required>
					<span class="input-style-focus"></span>
				</div>
				<div class="input-wrapper">
					<label class="txt-style1">Message</label>
					<textarea class="textarea-style" id="exampleFormControlTextarea1" rows="5"></textarea>
					<span class="textarea-style-focus"></span>
				</div>
				<div class="d-flex w-100">
					<button class="button-style" type="submit">
						Send
					</button>
				</div>
			</form>
		</div>
	</div>
</main>
<!-- Bootstrap 5.3.8 Bundle (includes Popper) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
